{% extends "notebook/layout.html" %}


{% block title %}Organisers{% endblock %}

{% block navtitle %}Organisers{% endblock %}

{% block content %}
<div class="grid grid-cols-1 lg:grid-cols-[1fr_auto] gap-6 px-4 py-8 items-start">
    <div class="card card-border bg-base-100 shadow-lg">
        <div class="card-body">
            <h2 class="card-title">Organisers</h2>
            <c-table
                :headers="table_headers"
                :rows="table_rows"
                empty_message="No organisers found. Add one using the form on the right."
            />
        </div>
    </div>

<c-form :form="form" action="" class="w-full" title="Create New Organiser" />
</div>
{% endblock %}
