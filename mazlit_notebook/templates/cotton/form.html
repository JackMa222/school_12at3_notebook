<div class="card card-border bg-base-100 w-96 shadow-lg">
    <div class="card-body">
        <form action="{{ action|default:'' }}" method="post" class="space-y-4 {{ class }}">
            {% csrf_token %}

            {% if form.non_field_errors %}
            <div class="error-box text-red-600">
                {{ form.non_field_errors }}
            </div>
            {% endif %}

            {% for field in form %}
            <div class="form-control w-full">
                <div class="form-group flex flex-col">
                    <label for="{{ field.id_for_label }}" class="font-medium text-sm">{{ field.label }}</label>
                </div>

                <div class="relative mt-1">
                    {{ field }}
                </div>

                {% if field.errors %}
                <span class="text-xs text-red-500 mt-1">
                    {{ field.errors|striptags }}
                </span>
                {% endif %}
            </div>
            {% endfor %}

            <div class="card-actions justify-end">
                {% if slot %}
                {{ slot }}
                {% else %}
                <button type="submit" class="btn">{{ submit_text|default:"Submit" }}</button>
                {% endif %}
            </div>
        </form>
    </div>
</div>
