<li>
    <a href="{{ url }}" class="is-drawer-close:tooltip is-drawer-close:tooltip-right
        {% if url == '/' and request.path == '/' %}
            bg-primary text-primary-content font-semibold
        {% elif url != '/' and url in request.path %}
            bg-primary text-primary-content font-semibold
        {% else %}
            hover:bg-base-200
        {% endif %}
    "
        data-tip="{{ label }}">
        {{ slot }}

        <span class="is-drawer-close:hidden">{{ label }}</span>
    </a>
</li>
