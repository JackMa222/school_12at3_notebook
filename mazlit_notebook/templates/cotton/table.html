<div class="overflow-x-auto w-full">
    <table class="table table-zebra w-full">
        <thead>
            <tr>
                {% for header in headers %}
                <th>{{ header }}</th>
                {% endfor %}
            </tr>
        </thead>
        <tbody>
            {% for row in rows %}
            <tr class="hover:bg-base-200/40 transition-colors">
                {% for cell in row %}
                <td>{{ cell|safe }}</td>
                {% endfor %}
            </tr>
            {% empty %}
            <tr>
                <td colspan="{{ headers|length }}" class="py-6 text-center text-base-content/50">
                    {{ empty_message|default:"No data found." }}
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
