{% if messages %}
<div class="toast toast-top toast-end z-50 p-4 space-y-2 max-w-sm w-full">
    {% for message in messages %}
    <div x-data="{ show: false }"
        x-init="setTimeout(() => show = true, 50); setTimeout(() => show = False, 5000)"
        x-show="show"

        x-transition:enter="transition ease-out duration-300"
        x-transition:enter-start="opacity-0 -translate-y-4 scale-95"
        x-transition:enter-end="opacity-100 translate-y-0 scale-100"
        x-transition:leave="transition ease-in duration-200"
        x-transition:leave-start="opacity-100 translate-y-0 scale-100"
        x-transition:leave-end="opacity-0 translate-y-2 scale-95"
    
    class="alert shadow-lg flex justify-between items-center transition-all duration-300
        {% if message.tags == 'success' %}alert-success
        {% elif message.tags == 'error' or message.tags == 'danger' %}alert-error
        {% elif message.tags == 'warning' %}alert-warning
        {% else %}alert-info{% endif %}">

        <div class="flex items-center gap-2 text-sm font-medium">
            {% if message.tags == 'success' %}
                success
            {% elif message.tags == 'error' or message.tags == 'danger' %}
                danger/error svg
            {% else %}
                else svg
            {% endif %}
            <span>{{ message }}</span>
        </div>
        <button @click="show = false" class="btn btn-ghost btn-xs btn-circle ml-4 hover:bg-black/10 transition-colors">X</button>
    </div>
    {% endfor %}
</div>
{% endif %}
