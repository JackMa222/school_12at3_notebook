<div x-data="{ confirmDelete: false}" class="inline-block">
    <button
        x-show="!confirmDelete"
        @click="confirmDelete = true"
        type="button"
        class="btn btn-error btn-sm"
    >
    {{ text|default:"Delete" }}
    </button>
    <div x-show="confirmDelete" x-transition class="flex items-center gap-2 bg-error/10 p-2 rounded-lg border border-error/20">
        <span class="text-xs font-semibold text-error">Confirm?</span>

        <form action="{{ url }}" method="post" class="inline">
            {% csrf_token %}
            <button type="submit" class="btn btn-error btn-xs text-white">Yes</button>
        </form>

        <button @click="confirmDelete = false" type="button" class="btn btn-ghost btn-xs">No</button>
    </div>
</div>
